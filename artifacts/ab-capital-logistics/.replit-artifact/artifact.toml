kind = "web"
previewPath = "/"
title = "AB Capital Logistics"
version = "1.0.0"
id = "artifacts/ab-capital-logistics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22466

[services.development]
run = "pnpm --filter @workspace/ab-capital-logistics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ab-capital-logistics", "run", "build" ]
publicDir = "artifacts/ab-capital-logistics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22466"
BASE_PATH = "/"
