openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AB Capital Logistics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quote
    description: Quote request operations
  - name: contact
    description: Contact form operations
  - name: tracking
    description: Shipment tracking operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quote:
    post:
      operationId: submitQuote
      tags: [quote]
      summary: Submit a freight quote request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "201":
          description: Quote request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          description: Invalid request

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Contact message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Invalid request

  /openai/conversations:
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}/messages:
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /tracking/{trackingNumber}:
    get:
      operationId: trackShipment
      tags: [tracking]
      summary: Track a shipment by tracking number
      parameters:
        - name: trackingNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shipment tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResult"
        "404":
          description: Tracking number not found

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenaiError'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenaiError'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenaiError'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    QuoteInput:
      type: object
      required:
        - name
        - email
        - phone
        - origin
        - destination
        - freightType
        - cargoType
        - weight
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        origin:
          type: string
        destination:
          type: string
        freightType:
          type: string
          enum: [air, ocean, road, warehousing, customs, threepl]
        cargoType:
          type: string
        weight:
          type: string
        volume:
          type: ["string", "null"]
        incoterms:
          type: ["string", "null"]
        hazardous:
          type: boolean
        message:
          type: ["string", "null"]

    QuoteResponse:
      type: object
      required:
        - success
        - referenceNumber
        - message
      properties:
        success:
          type: boolean
        referenceNumber:
          type: string
        message:
          type: string

    ContactInput:
      type: object
      required:
        - name
        - email
        - subject
        - message
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        subject:
          type: string
        message:
          type: string

    ContactResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    TrackingEvent:
      type: object
      required:
        - date
        - time
        - location
        - status
        - description
      properties:
        date:
          type: string
        time:
          type: string
        location:
          type: string
        status:
          type: string
        description:
          type: string

    TrackingResult:
      type: object
      required:
        - trackingNumber
        - status
        - origin
        - destination
        - estimatedDelivery
        - carrier
        - freightType
        - events
      properties:
        trackingNumber:
          type: string
        status:
          type: string
          enum: [in_transit, customs_clearance, delivered, pending, out_for_delivery]
        origin:
          type: string
        destination:
          type: string
        estimatedDelivery:
          type: string
        carrier:
          type: string
        freightType:
          type: string
        weight:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        events:
          type: array
          items:
            $ref: "#/components/schemas/TrackingEvent"

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
